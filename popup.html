<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ChatGPT Shifter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  
  <header>
    <div class="logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
      <span>Layout Shifter</span>
    </div>
    <div id="status-indicator" class="status-badge hidden">On ChatGPT</div>
  </header>

  <main id="app-container">
    
    <div class="segmented-control">
      <button id="btn-left" class="segment">Left</button>
      <button id="btn-center" class="segment">Center</button>
      <button id="btn-right" class="segment">Right</button>
    </div>

    <div class="slider-wrapper">
      <div class="slider-header">
        <label>Shift Distance</label>
        <div class="input-group">
          <input type="number" id="number-input" value="0" step="10">
          <span class="unit">px</span>
        </div>
      </div>
      <input type="range" id="offset-slider" min="-700" max="700" value="0" step="10">
    </div>

  </main>

  <footer>
    <button id="btn-reset-defaults">Reset Defaults</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
