<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shifter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="logo">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <line x1="9" y1="3" x2="9" y2="21"/>
      </svg>
      <span>Shifter</span>
    </div>
    <div class="header-right">
      <button id="btn-toggle" class="toggle-btn" title="Toggle shift on/off">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </button>
      <div id="status-dot" class="status-dot" title="Active on ChatGPT"></div>
    </div>
  </header>

  <main id="app">

    <!-- Position -->
    <section class="row-section">
      <span class="label">Position</span>
      <div class="seg">
        <button id="btn-left"   class="seg-btn">← Left</button>
        <button id="btn-center" class="seg-btn">Center</button>
        <button id="btn-right"  class="seg-btn">Right →</button>
      </div>
    </section>

    <div class="divider"></div>

    <!-- Offset -->
    <section class="slider-section">
      <div class="slider-row">
        <span class="label">Offset</span>
        <div class="num-wrap">
          <input type="number" id="num" value="0" placeholder="0">
          <span class="unit">px</span>
        </div>
      </div>
      <input type="range" id="slider" min="-700" max="700" value="0" step="10">
    </section>

    <div class="divider"></div>

    <!-- Sidebar controls -->
    <section class="sidebar-section">

      <div class="toggle-row">
        <div>
          <div class="label">Hide sidebar</div>
          <div class="sublabel">Maximise chat width</div>
        </div>
        <button id="sidebar-toggle" class="pill-toggle" aria-pressed="false">
          <span class="pill-knob"></span>
        </button>
      </div>

      <div class="toggle-row">
        <div>
          <div class="label">Sidebar side</div>
          <div class="sublabel">Where it appears</div>
        </div>
        <div class="seg mini-seg">
          <button id="sidebar-left-btn"  class="seg-btn active">Left</button>
          <button id="sidebar-right-btn" class="seg-btn">Right</button>
        </div>
      </div>

      <div id="sidebar-width-wrap" class="sidebar-width-wrap">
        <div class="slider-row">
          <span class="label">Sidebar width</span>
          <div class="num-wrap">
            <input type="number" id="sidebar-width-num" value="260" placeholder="260">
            <span class="unit">px</span>
          </div>
        </div>
        <input type="range" id="sidebar-width-slider" min="100" max="400" value="260" step="10">
      </div>

    </section>

  </main>

  <footer>
    <button id="btn-reset" class="ghost">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3.95"/>
      </svg>
      Reset all
    </button>
    <span class="hint">Alt+Shift+[ ] \</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
